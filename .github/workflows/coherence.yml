# ════════════════════════════════════════════════════════════════════════
#  GARDE-FOU AUTOMATIQUE — Cohérence des référentiels intermittent
# ════════════════════════════════════════════════════════════════════════
#
#  Ce workflow lance test_coherence_intermittent.py à CHAQUE push et à chaque
#  pull request. Si les deux référentiels (regles_intermittent.py côté backend
#  et regles_intermittent.js côté frontend) divergent sur une règle commune,
#  le test échoue → une croix rouge ❌ apparaît sur le commit, et tu es alerté.
#
#  Tu n'as RIEN à lancer : GitHub s'en charge tout seul.
#
#  Où le voir : onglet "Actions" du repo, ou la pastille verte/rouge à côté
#  du dernier commit.
# ════════════════════════════════════════════════════════════════════════

name: Cohérence référentiels intermittent

# Quand lancer : à chaque push et chaque pull request sur la branche main.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  coherence:
    runs-on: ubuntu-latest
    steps:
      # 1. Récupère le code du repo
      - name: Récupérer le code
        uses: actions/checkout@v4

      # 2. Installe Python
      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Lance le test de cohérence.
      #    Le script renvoie 0 si cohérent (✅), 1 si divergence (❌).
      #    Un code 1 fait échouer le job → alerte visible sur le commit.
      - name: Vérifier la cohérence .py ↔ .js
        run: python3 test_coherence_intermittent.py
